<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KPC Foreign Worker Guidelines</title>
  <style>
    :root {
      --primary: #ef4444;
      --primary-dark: #dc2626;
      --accent: #f97316;
      --bg: #0f172a;
      --surface: #1e293b;
      --surface2: #273549;
      --border: #334155;
      --text: #f1f5f9;
      --text-muted: #94a3b8;
      --success: #10b981;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* ── 헤더 ── */
    header {
      background: linear-gradient(135deg, #450a0a, #7f1d1d, #450a0a);
      padding: 18px 32px;
      display: flex; align-items: center; gap: 16px;
      border-bottom: 1px solid #7f1d1d;
      position: sticky; top: 0; z-index: 100;
    }
    header .logo { font-size: 28px; }
    header h1 { font-size: 18px; font-weight: 700; }
    header p { font-size: 12px; color: #fca5a5; margin-top: 2px; }
    .header-nav { margin-left: auto; display: flex; align-items: center; gap: 10px; }
    .nav-btn {
      padding: 7px 16px; border-radius: 8px; border: 1px solid var(--border);
      background: transparent; color: var(--text-muted); font-size: 13px;
      cursor: pointer; transition: all 0.2s; text-decoration: none;
      display: inline-flex; align-items: center; gap: 6px;
    }
    .nav-btn:hover { background: var(--surface2); color: var(--text); }
    .nav-btn.danger { background: var(--primary); border-color: var(--primary); color: #fff; }
    .nav-btn.danger:hover { background: var(--primary-dark); }
    .admin-badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(239,68,68,0.2); border: 1px solid rgba(239,68,68,0.5);
      color: #fca5a5; padding: 5px 14px; border-radius: 20px;
      font-size: 12px; font-weight: 600;
    }

    /* ── 언어 선택 바 ── */
    .lang-bar {
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 10px 20px; display: flex; align-items: center; gap: 8px;
      flex-wrap: wrap;
    }
    .lang-bar span { font-size: 12px; color: var(--text-muted); margin-right: 4px; }
    .lang-chip {
      padding: 5px 12px; border-radius: 20px; border: 1px solid var(--border);
      background: var(--bg); color: var(--text-muted); font-size: 12px;
      cursor: pointer; transition: all 0.15s;
    }
    .lang-chip:hover { border-color: var(--primary); color: var(--text); }
    .lang-chip.active {
      background: var(--primary); border-color: var(--primary);
      color: #fff; font-weight: 600;
    }

    /* ── 메인 ── */
    .main { max-width: 860px; margin: 0 auto; padding: 28px 20px; }
    .toolbar {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 20px; flex-wrap: wrap; gap: 12px;
    }
    .toolbar h2 { font-size: 20px; font-weight: 700; display: flex; align-items: center; gap: 8px; }

    /* ── 공지 카드 ── */
    .emg-card {
      background: var(--surface); border: 1px solid #7f1d1d;
      border-left: 4px solid var(--primary);
      border-radius: 14px; padding: 22px 24px; margin-bottom: 16px;
      transition: border-color 0.2s;
    }
    .emg-card:hover { border-color: var(--primary); }
    .emg-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 14px; gap: 12px; }
    .emg-title { font-size: 17px; font-weight: 700; color: #fca5a5; line-height: 1.4; }
    .emg-meta { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
    .emg-time { font-size: 11px; color: #475569; }
    .edited-badge { font-size: 10px; color: #64748b; font-style: italic; margin-left: 4px; }
    .emg-body { font-size: 15px; line-height: 1.8; color: var(--text); white-space: pre-line; }
    .emg-lang-badge {
      display: inline-flex; align-items: center; gap: 5px;
      background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.3);
      color: #fca5a5; padding: 3px 10px; border-radius: 20px;
      font-size: 11px; font-weight: 600; margin-bottom: 10px;
    }
    .emg-actions { display: flex; gap: 8px; margin-top: 14px; }
    .btn-edit {
      padding: 5px 12px; background: rgba(16,185,129,0.1);
      border: 1px solid rgba(16,185,129,0.3); color: #6ee7b7;
      border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.2s;
    }
    .btn-edit:hover { background: rgba(16,185,129,0.25); }
    .btn-delete {
      padding: 5px 12px; background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3); color: #fca5a5;
      border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.2s;
    }
    .btn-delete:hover { background: rgba(239,68,68,0.3); }

    /* ── 인라인 수정 ── */
    .inline-edit { display: none; margin-top: 12px; }
    .inline-edit.open { display: flex; flex-direction: column; gap: 10px; }
    .inline-edit input, .inline-edit textarea {
      width: 100%; padding: 10px 14px;
      background: var(--bg); border: 1px solid var(--primary);
      border-radius: 8px; color: var(--text); font-size: 14px; font-family: inherit;
    }
    .inline-edit textarea { resize: vertical; min-height: 100px; }
    .inline-edit input:focus, .inline-edit textarea:focus { outline: none; }
    .inline-edit-actions { display: flex; gap: 8px; justify-content: flex-end; }

    /* ── 글쓰기 모달 ── */
    .modal-bg {
      position: fixed; inset: 0; background: rgba(0,0,0,0.75);
      display: flex; align-items: center; justify-content: center;
      z-index: 200; padding: 20px;
    }
    .modal-bg.hidden { display: none; }
    .modal {
      background: var(--surface); border: 1px solid #7f1d1d;
      border-radius: 18px; padding: 28px; width: 100%; max-width: 540px;
    }
    .modal h3 { font-size: 18px; font-weight: 700; margin-bottom: 20px; color: #fca5a5; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 13px; color: var(--text-muted); margin-bottom: 6px; }
    .form-group input, .form-group textarea {
      width: 100%; padding: 11px 14px;
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text); font-size: 14px; font-family: inherit;
    }
    .form-group input:focus, .form-group textarea:focus { outline: none; border-color: var(--primary); }
    .form-group textarea { resize: vertical; min-height: 140px; }
    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; }

    /* ── 관리자 로그인 모달 ── */
    .admin-modal-bg {
      position: fixed; inset: 0; background: rgba(0,0,0,0.75);
      display: flex; align-items: center; justify-content: center; z-index: 300;
    }
    .admin-modal-bg.hidden { display: none; }
    .admin-modal {
      background: var(--surface); border: 1px solid #7f1d1d;
      border-radius: 16px; padding: 28px; width: 320px;
    }
    .admin-modal h3 { font-size: 16px; font-weight: 700; margin-bottom: 16px; }
    .admin-modal input {
      width: 100%; padding: 11px 14px;
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text); font-size: 14px; margin-bottom: 14px;
    }
    .admin-modal input:focus { outline: none; border-color: var(--primary); }
    .err-msg { font-size: 12px; color: var(--primary); margin-bottom: 10px; display: none; }

    /* ── 빈 상태 ── */
    .empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); }
    .empty-state .icon { font-size: 48px; margin-bottom: 12px; }

    /* ── 토스트 ── */
    .toast {
      position: fixed; bottom: 30px; right: 30px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 10px; padding: 12px 20px; font-size: 14px;
      color: var(--text); z-index: 999;
      transform: translateY(80px); opacity: 0; transition: all 0.3s;
    }
    .toast.show { transform: translateY(0); opacity: 1; }

    .btn { padding: 8px 18px; border-radius: 8px; border: none; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-primary:hover { background: var(--primary-dark); }
    .btn-secondary { background: var(--surface2); color: var(--text-muted); border: 1px solid var(--border); }
    .btn-secondary:hover { color: var(--text); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .spinner {
      width: 14px; height: 14px; border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff; border-radius: 50%;
      animation: spin 0.6s linear infinite; display: inline-block;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<!-- 헤더 -->
<header>
  <div class="logo">📋</div>
  <div>
    <h1>KPC Foreign Worker Guidelines</h1>
    <p>Admin-only announcements · Auto-translated into 12 languages</p>
  </div>
  <div class="header-nav">
    <span id="adminBadge" class="admin-badge" style="display:none">👑 관리자 모드</span>
    <button class="nav-btn" id="adminToggleBtn" onclick="toggleAdminMode()">🔐 관리자 로그인</button>
    <a href="/board" class="nav-btn">💬 게시판</a>
    <a href="/" class="nav-btn">← 통역기로</a>
  </div>
</header>

<!-- 언어 선택 바 -->
<div class="lang-bar">
  <span>🌐 언어 선택:</span>
  <div id="langChips"></div>
</div>

<div class="main">
  <div class="toolbar">
    <h2>📋 Foreign Worker Guidelines</h2>
    <div id="adminPostBtn" style="display:none">
      <button class="nav-btn danger" onclick="openPostModal()">📢 공지 작성</button>
    </div>
  </div>

  <div id="postList"></div>
</div>

<!-- 글쓰기 모달 -->
<div class="modal-bg hidden" id="postModal">
  <div class="modal">
    <h3>🚨 긴급 공지 작성</h3>
    <div class="form-group">
      <label>제목</label>
      <input type="text" id="postTitle" placeholder="제목을 입력하세요" maxlength="80" />
    </div>
    <div class="form-group">
      <label>내용 (한국어로 작성 → 12개 언어 자동번역)</label>
      <textarea id="postText" placeholder="내용을 한국어로 작성하세요..."></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closePostModal()">취소</button>
      <button class="btn btn-primary" id="submitPostBtn" onclick="submitPost()">공지 등록</button>
    </div>
  </div>
</div>

<!-- 관리자 로그인 모달 -->
<div class="admin-modal-bg hidden" id="adminModal">
  <div class="admin-modal">
    <h3>🔐 관리자 로그인</h3>
    <input type="password" id="adminPwInput" placeholder="관리자 비밀번호"
           onkeydown="if(event.key==='Enter') doAdminLogin()" />
    <div class="err-msg" id="adminErr">비밀번호가 틀렸습니다.</div>
    <div style="display:flex;gap:8px;justify-content:flex-end">
      <button class="btn btn-secondary" onclick="document.getElementById('adminModal').classList.add('hidden')">취소</button>
      <button class="btn btn-primary" onclick="doAdminLogin()">로그인</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SERVER_BASE = "";
const LANGUAGES = {
  ko: { name:"한국어",     flag:"🇰🇷" },
  en: { name:"English",   flag:"🇺🇸" },
  zh: { name:"中文(简体)", flag:"🇨🇳" },
  th: { name:"ภาษาไทย",  flag:"🇹🇭" },
  vi: { name:"Tiếng Việt",flag:"🇻🇳" },
  id: { name:"Bahasa Indonesia", flag:"🇮🇩" },
  ms: { name:"Bahasa Melayu",   flag:"🇲🇾" },
  tl: { name:"Filipino", flag:"🇵🇭" },
  my: { name:"မြန်မာဘာသာ",flag:"🇲🇲" },
  uz: { name:"O'zbek tili", flag:"🇺🇿" },
  si: { name:"සිංහල",    flag:"🇱🇰" },
  mn: { name:"Монгол хэл",flag:"🇲🇳" },
};

let isAdmin = false;
let adminPassword = "";
let currentLang = "ko";

// ── 언어 칩 초기화 ───────────────────────────────────────────
function initLangChips() {
  const wrap = document.getElementById("langChips");
  wrap.innerHTML = Object.entries(LANGUAGES).map(([code, info]) => `
    <button class="lang-chip${code === "ko" ? " active" : ""}"
            onclick="selectLang('${code}')" id="chip-${code}">
      ${info.flag} ${info.name}
    </button>
  `).join("");
}

function selectLang(code) {
  currentLang = code;
  document.querySelectorAll(".lang-chip").forEach(el => el.classList.remove("active"));
  document.getElementById(`chip-${code}`).classList.add("active");
  renderPosts(cachedPosts);
}

// ── 관리자 모드 ──────────────────────────────────────────────
function toggleAdminMode() {
  if (isAdmin) {
    isAdmin = false; adminPassword = "";
    document.getElementById("adminBadge").style.display = "none";
    document.getElementById("adminToggleBtn").textContent = "🔐 관리자 로그인";
    document.getElementById("adminPostBtn").style.display = "none";
    renderPosts(cachedPosts);
  } else {
    document.getElementById("adminModal").classList.remove("hidden");
    document.getElementById("adminPwInput").value = "";
    document.getElementById("adminErr").style.display = "none";
    setTimeout(() => document.getElementById("adminPwInput").focus(), 100);
  }
}

async function doAdminLogin() {
  const pw = document.getElementById("adminPwInput").value;
  try {
    const res = await fetch(`${SERVER_BASE}/api/board/admin/verify`, {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ password: pw }),
    });
    if (res.ok) {
      isAdmin = true; adminPassword = pw;
      document.getElementById("adminModal").classList.add("hidden");
      document.getElementById("adminBadge").style.display = "inline-flex";
      document.getElementById("adminToggleBtn").textContent = "🚪 로그아웃";
      document.getElementById("adminPostBtn").style.display = "block";
      renderPosts(cachedPosts);
      showToast("관리자 모드 활성화");
    } else {
      document.getElementById("adminErr").style.display = "block";
    }
  } catch {
    document.getElementById("adminErr").style.display = "block";
  }
}

// ── 글쓰기 모달 ──────────────────────────────────────────────
function openPostModal() {
  document.getElementById("postModal").classList.remove("hidden");
  document.getElementById("postTitle").value = "";
  document.getElementById("postText").value = "";
  document.getElementById("postTitle").focus();
}
function closePostModal() {
  document.getElementById("postModal").classList.add("hidden");
}

async function submitPost() {
  const title = document.getElementById("postTitle").value.trim();
  const text  = document.getElementById("postText").value.trim();
  if (!title) { showToast("제목을 입력하세요"); return; }
  if (!text)  { showToast("내용을 입력하세요"); return; }

  const btn = document.getElementById("submitPostBtn");
  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> 번역 중...';

  try {
    const res = await fetch(`${SERVER_BASE}/api/emergency/posts`, {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ title, text, admin_password: adminPassword }),
    });
    if (!res.ok) { const d = await res.json().catch(() => ({})); showToast(d.detail || "오류"); return; }
    closePostModal();
    showToast("공지가 등록됐습니다 (12개 언어 번역 완료)");
    await loadPosts();
  } catch { showToast("서버 연결 오류"); }
  finally { btn.disabled = false; btn.textContent = "공지 등록"; }
}

// ── 게시글 로드 & 렌더 ────────────────────────────────────────
let cachedPosts = [];

async function loadPosts() {
  try {
    const res = await fetch(`${SERVER_BASE}/api/emergency/posts`);
    cachedPosts = await res.json();
    renderPosts(cachedPosts);
  } catch {
    document.getElementById("postList").innerHTML =
      '<div class="empty-state"><div class="icon">⚠️</div><p>불러오기 실패</p></div>';
  }
}

function renderPosts(posts) {
  const el = document.getElementById("postList");
  if (!posts.length) {
    el.innerHTML = '<div class="empty-state"><div class="icon">📭</div><p>등록된 공지가 없습니다.<br>No guidelines posted yet.</p></div>';
    return;
  }

  const langInfo = LANGUAGES[currentLang];
  el.innerHTML = posts.map(post => {
    const title = post.title_translations?.[currentLang] || post.title;
    const text  = post.translations?.[currentLang] || post.original_text;
    return `
    <div class="emg-card" id="epost-${post.id}">
      <div class="emg-header">
        <div class="emg-title">📋 ${escHtml(title)}${post.edited ? '<span class="edited-badge">(edited)</span>' : ""}</div>
        <div class="emg-meta">
          <span class="emg-time">${post.timestamp}</span>
        </div>
      </div>

      <div class="emg-lang-badge">${langInfo.flag} ${langInfo.name}</div>

      <div id="ebody-${post.id}">
        <div class="emg-body">${escHtml(text)}</div>
        ${currentLang !== "ko" ? `
        <div style="margin-top:12px;border-left:3px solid #334155;padding-left:12px;font-size:12px;color:#64748b;line-height:1.7">
          🇰🇷 ${escHtml(post.original_text)}
        </div>` : ""}
      </div>

      ${isAdmin ? `
      <div class="inline-edit" id="eedit-${post.id}">
        <input type="text" id="etitle-${post.id}" value="${escAttr(post.title)}" placeholder="제목" />
        <textarea id="etext-${post.id}" placeholder="한국어로 수정...">${escHtml(post.original_text)}</textarea>
        <div class="inline-edit-actions">
          <button class="btn btn-secondary" onclick="cancelEdit('${post.id}')">취소</button>
          <button class="btn btn-primary" id="esave-${post.id}" onclick="saveEdit('${post.id}')">저장</button>
        </div>
      </div>
      <div class="emg-actions">
        <button class="btn-edit" onclick="toggleEdit('${post.id}')">✏️ 수정</button>
        <button class="btn-delete" onclick="deletePost('${post.id}')">🗑 삭제</button>
      </div>` : ""}
    </div>`;
  }).join("");
}

// ── 수정 ────────────────────────────────────────────────────
function toggleEdit(id) {
  const form = document.getElementById(`eedit-${id}`);
  const body = document.getElementById(`ebody-${id}`);
  const open = form.classList.toggle("open");
  body.style.display = open ? "none" : "";
  if (open) document.getElementById(`etitle-${id}`).focus();
}
function cancelEdit(id) {
  document.getElementById(`eedit-${id}`).classList.remove("open");
  document.getElementById(`ebody-${id}`).style.display = "";
}
async function saveEdit(id) {
  const title = document.getElementById(`etitle-${id}`).value.trim();
  const text  = document.getElementById(`etext-${id}`).value.trim();
  if (!title || !text) { showToast("제목과 내용을 입력하세요"); return; }
  const btn = document.getElementById(`esave-${id}`);
  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>';
  try {
    const res = await fetch(`${SERVER_BASE}/api/emergency/posts/${id}`, {
      method: "PUT", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ title, text, admin_password: adminPassword }),
    });
    if (!res.ok) { const d = await res.json().catch(() => ({})); showToast(d.detail || "오류"); return; }
    showToast("수정됐습니다 (12개 언어 재번역)");
    await loadPosts();
  } catch { showToast("서버 연결 오류"); }
  finally { btn.disabled = false; btn.textContent = "저장"; }
}

// ── 삭제 ────────────────────────────────────────────────────
async function deletePost(id) {
  if (!confirm("이 공지를 삭제하시겠습니까?")) return;
  try {
    const res = await fetch(`${SERVER_BASE}/api/emergency/posts/${id}?pw=${encodeURIComponent(adminPassword)}`, { method: "DELETE" });
    if (res.ok) { showToast("삭제됐습니다"); await loadPosts(); }
    else showToast("삭제 실패");
  } catch { showToast("서버 연결 오류"); }
}

// ── 유틸 ────────────────────────────────────────────────────
function escHtml(s) {
  return String(s ?? "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}
function escAttr(s) {
  return String(s ?? "").replace(/"/g,"&quot;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

let toastTimer;
function showToast(msg) {
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove("show"), 3000);
}

document.getElementById("postModal").addEventListener("click", e => {
  if (e.target === document.getElementById("postModal")) closePostModal();
});
document.getElementById("adminModal").addEventListener("click", e => {
  if (e.target === document.getElementById("adminModal"))
    document.getElementById("adminModal").classList.add("hidden");
});

initLangChips();
loadPosts();
setInterval(loadPosts, 30000);
</script>
</body>
</html>
